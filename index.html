<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Tâches</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0ede6;--w:#ffffff;--b:#e2ddd4;--b2:#ede9e0;
  --ink:#1a1816;--ink2:#6b6760;--ink3:#b0aca4;
  --dead-c:#9c1515;--dead-bg:#fde8e8;
  --today-c:#c94a1a;--today-bg:#fdf0eb;
  --s-todo:#7c3aed;--s-todo-bg:#ede9fe;
  --s-wip:#d97706;--s-wip-bg:#fef3c7;
  --s-done:#047857;--s-done-bg:#d1fae5;
  --s-block:#dc2626;--s-block-bg:#fee2e2;
  --red:#dc2626;--brand:#88435a;
}
body{font-family:'Karla',sans-serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
header{background:var(--brand);color:#fff;height:52px;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
header h1{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:-.5px;}
.nav-tabs{display:flex;gap:2px;margin-left:12px;}
.nav-tab{padding:4px 11px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:#bbb;border:none;background:none;transition:all .15s;font-family:'Karla',sans-serif;}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.1);}
.nav-tab.active{color:#fff;background:rgba(255,255,255,.18);}
.hactions{display:flex;gap:5px;margin-left:auto;align-items:center;}
.hdate{font-size:11px;color:#999;font-family:'Syne',sans-serif;margin-right:4px;}
.hbtn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#ccc;font-family:'Karla',sans-serif;transition:all .15s;}
.hbtn:hover{background:rgba(255,255,255,.18);color:#fff;}
.hbtn.imp{border-color:rgba(100,200,120,.4);color:#8de8a0;}
#importFile{display:none;}
.hstats{display:flex;gap:8px;}
.hstat{font-size:11px;color:#888;}.hstat b{color:#fff;}

/* APP */
.app{flex:1;display:flex;overflow:hidden;}

/* VIEWS */
.view{flex:1;overflow:hidden;display:none;}
.view.active{display:flex;flex-direction:column;}

/* SHARED */
.inp{width:100%;padding:7px 10px;border:1px solid var(--b);border-radius:7px;font-family:'Karla',sans-serif;font-size:13px;background:var(--bg);color:var(--ink);outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--ink);background:#fff;}
.inp::placeholder{color:var(--ink3);}
.btn{padding:7px 11px;border:none;border-radius:7px;font-family:'Karla',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.btn-ink{background:var(--ink);color:#fff;}.btn-ink:hover{opacity:.82;}
.btn-soft{background:var(--b);color:var(--ink2);}.btn-soft:hover{background:var(--b2);}
.pill{font-size:9px;font-weight:700;font-family:'Syne',sans-serif;padding:1px 5px;border-radius:7px;text-transform:uppercase;letter-spacing:.3px;}
.p-todo{background:var(--s-todo-bg);color:var(--s-todo);}
.p-wip{background:var(--s-wip-bg);color:var(--s-wip);}
.p-done{background:var(--s-done-bg);color:var(--s-done);}
.p-blocked{background:var(--s-block-bg);color:var(--s-block);}
.sdue{font-size:10px;font-family:'Syne',sans-serif;}
.sdue.overdue{color:var(--red);font-weight:700;}
.sdue.dtoday{color:var(--today-c);font-weight:600;}
.sdue.normal{color:var(--ink3);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--b);border-radius:10px;}

/* ── TÂCHES VIEW ── */
.tasks-view{display:flex;flex:1;overflow:hidden;}
.tasks-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.tasks-toolbar{padding:10px 14px;border-bottom:1px solid var(--b2);display:flex;gap:8px;align-items:center;flex-shrink:0;background:var(--w);}
.tasks-toolbar .inp{flex:1;max-width:280px;}
.sort-btn{font-size:10px;padding:3px 8px;border-radius:10px;border:1px solid var(--b);background:none;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;color:var(--ink3);transition:all .12s;}
.sort-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.filter-select{padding:5px 8px;border:1px solid var(--b);border-radius:7px;font-family:'Karla',sans-serif;font-size:12px;background:var(--bg);color:var(--ink);outline:none;cursor:pointer;}
.tasks-list{flex:1;overflow-y:auto;}
.titem{display:flex;align-items:flex-start;gap:8px;padding:8px 14px;cursor:pointer;transition:background .1s;border-left:3px solid transparent;border-bottom:1px solid var(--b2);}
.titem:hover{background:var(--bg);}
.titem.active{background:#f5f2ec;border-left-color:var(--ink);}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.tinfo{flex:1;min-width:0;}
.tname{font-size:13px;line-height:1.4;font-weight:500;}
.tname.done{text-decoration:line-through;color:var(--ink3);}
.tmeta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:3px;}
.tasks-add{padding:12px 14px;border-top:1px solid var(--b2);background:var(--w);flex-shrink:0;}
.tasks-add-row{display:flex;gap:6px;margin-bottom:6px;}
.tasks-add-row2{display:flex;gap:6px;}

/* ── WEEK VIEW ── */
.week-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.week-nav{display:flex;align-items:center;gap:10px;padding:11px 14px 9px;border-bottom:1px solid var(--b2);flex-shrink:0;}
.week-nav h2{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;}
.week-nav button{background:var(--w);border:1px solid var(--b);border-radius:7px;padding:5px 12px;cursor:pointer;font-family:'Karla',sans-serif;font-size:12px;font-weight:600;}
.week-nav button:hover{background:var(--b);}
.week-nav .wn-today{margin-left:auto;}
.week-grid{flex:1;display:grid;overflow:hidden;}
.wcol{background:var(--w);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;}
.wcol:last-child{border-right:none;}
.wcol-head{padding:10px 8px 8px;border-bottom:1px solid var(--b2);flex-shrink:0;text-align:center;}
.wcol-day{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);}
.wcol-date{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--ink);line-height:1.1;}
.wcol-date.is-today{background:var(--brand);color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:14px;}
.wcol.today-col{background:#fffaf7;}
.wcol.unplan-col{background:var(--bg);}
.wcol-body{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px;}
.wcol-body.over{background:#f0ede6;}
.wcard{background:var(--w);border:1px solid var(--b);border-radius:7px;padding:7px 9px;cursor:pointer;border-left:3px solid transparent;transition:box-shadow .12s,transform .1s;}
.wcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.07);transform:translateY(-1px);}
.wcard.active{box-shadow:0 0 0 2px var(--ink);}
.wcard.is-dead{background:#fff8f8;border-left-color:var(--dead-c)!important;}
.wcard.unplan{background:var(--bg);}
.wname{font-size:12px;font-weight:500;line-height:1.3;}
.wname.done{text-decoration:line-through;color:var(--ink3);}
.wmeta{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-top:4px;}
.wempty{color:var(--ink3);font-size:11px;text-align:center;padding:14px 0;font-family:'Syne',sans-serif;}
.kdue-red{font-size:10px;font-weight:700;color:var(--dead-c);font-family:'Syne',sans-serif;}
.kdue-norm{font-size:10px;color:var(--ink3);font-family:'Syne',sans-serif;}

/* ── CALENDAR ── */
.calendar-wrap{flex:1;overflow-y:auto;padding:12px;}
.cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.cal-nav h2{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;}
.cal-nav button{background:var(--w);border:1px solid var(--b);border-radius:7px;padding:5px 11px;cursor:pointer;font-family:'Karla',sans-serif;font-size:12px;font-weight:600;}
.cal-nav button:hover{background:var(--b);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--b);border-radius:10px;overflow:hidden;border:1px solid var(--b);}
.cal-dh{background:var(--brand);color:#fff;text-align:center;padding:7px 4px;font-size:10px;font-weight:700;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:.5px;}
.cal-day{background:var(--w);min-height:90px;padding:5px;display:flex;flex-direction:column;gap:2px;}
.cal-day:hover{background:var(--bg);}
.cal-day.om{background:var(--bg);opacity:.6;}
.cal-day.td{background:#fff8f0;}
.cal-dnum{font-size:11px;font-weight:700;font-family:'Syne',sans-serif;color:var(--ink2);margin-bottom:2px;}
.cal-day.td .cal-dnum{background:var(--brand);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.cal-chip{font-size:10px;padding:2px 5px;border-radius:4px;cursor:pointer;border-left:2px solid transparent;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-chip:hover{opacity:.75;}
.cal-chip.dead{border-left-color:var(--dead-c)!important;background:var(--dead-bg)!important;color:var(--dead-c)!important;font-weight:700;}
.cal-chip.nodate{border-left-color:var(--ink3);background:var(--bg);color:var(--ink2);font-style:italic;}

/* ── EVENTS ── */
.events-outer{display:flex;flex:1;overflow:hidden;height:100%;}
.events-main{flex:1;overflow-y:auto;padding:12px;min-width:0;}
.events-layout{display:grid;grid-template-columns:200px 1fr;gap:12px;min-height:0;flex:1;}
.ev-list{background:var(--w);border-radius:12px;border:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;}
.ev-list-h{padding:10px 12px 8px;border-bottom:1px solid var(--b2);font-family:'Syne',sans-serif;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:space-between;}
.ev-items{flex:1;overflow-y:auto;}
.ev-item{padding:8px 12px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;display:flex;align-items:center;gap:8px;}
.ev-item:hover{background:var(--bg);}
.ev-item.active{background:#f5f2ec;border-left-color:var(--ink);}
.ev-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.1);}
.ev-name-text{font-size:12px;font-weight:600;flex:1;}
.ev-cnt{font-size:10px;color:var(--ink3);font-family:'Syne',sans-serif;}
.ev-detail{background:var(--w);border-radius:12px;border:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;}
.ev-detail-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--ink3);font-family:'Syne',sans-serif;font-size:13px;}
.ev-dh{padding:12px 16px 10px;border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ev-color-btn{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.15);cursor:pointer;position:relative;}
.ev-color-picker{position:absolute;top:28px;left:0;background:var(--w);border:1px solid var(--b);border-radius:10px;padding:8px;display:flex;flex-wrap:wrap;gap:6px;z-index:100;width:158px;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.ev-color-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.ev-color-swatch:hover{transform:scale(1.15);}
.ev-color-swatch.sel{border-color:var(--ink);}
.ev-dname{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;flex:1;border:none;outline:none;background:transparent;color:var(--ink);}
.ev-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:14px;}
.ev-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);font-family:'Syne',sans-serif;margin-bottom:5px;}
.ev-notes{width:100%;min-height:90px;padding:9px 11px;border:1px solid var(--b);border-radius:8px;font-family:'Karla',sans-serif;font-size:13px;background:var(--bg);color:var(--ink);outline:none;resize:vertical;line-height:1.6;transition:border-color .15s;}
.ev-notes:focus{border-color:var(--ink);background:#fff;}
.ev-task-row{display:flex;align-items:flex-start;gap:8px;padding:6px 9px;background:var(--bg);border-radius:7px;margin-bottom:4px;border:1px solid var(--b);cursor:pointer;transition:background .1s;}
.ev-task-row:hover{background:#ece9e1;}
.ev-task-name{font-size:12px;flex:1;line-height:1.4;}
.ev-task-name.done{text-decoration:line-through;color:var(--ink3);}
.ev-no-tasks{font-size:12px;color:var(--ink3);font-family:'Syne',sans-serif;padding:6px 0;}
/* Quick add task in event */
.ev-quick-add{display:flex;gap:6px;margin-top:8px;}
.ev-quick-inp{flex:1;padding:6px 9px;border:1px solid var(--b);border-radius:7px;font-family:'Karla',sans-serif;font-size:12px;background:var(--bg);color:var(--ink);outline:none;}
.ev-quick-inp:focus{border-color:var(--ink);background:#fff;}

/* Today panel */
.today-col-wrap{width:240px;flex-shrink:0;background:var(--w);border-left:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;}
.today-col-head{padding:11px 13px 9px;border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:8px;flex-shrink:0;background:#fffaf7;}
.today-col-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;}
.today-col-body{flex:1;overflow-y:auto;padding:8px;}
.today-task-card{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:7px 9px;margin-bottom:5px;cursor:pointer;border-left:3px solid transparent;transition:box-shadow .12s;display:flex;align-items:flex-start;gap:6px;}
.today-task-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.07);}
.today-drag-handle{color:var(--ink3);font-size:12px;cursor:grab;flex-shrink:0;padding-top:1px;user-select:none;}
.today-drag-handle:active{cursor:grabbing;}
.today-task-card.drag-over-today{background:#f0ede6;border-top:2px solid var(--brand);}
.today-task-name{font-size:12px;font-weight:500;line-height:1.3;}
.today-task-proj{font-size:10px;font-family:'Syne',sans-serif;font-weight:700;margin-top:2px;}
.today-empty{color:var(--ink3);font-size:12px;text-align:center;padding:20px 0;font-family:'Syne',sans-serif;}
.deadline-encart{background:var(--dead-bg);border:1px solid #f5adad;border-radius:12px;padding:11px 14px;flex-shrink:0;}

/* ── ARCHIVE ── */
.archive-wrap{flex:1;overflow-y:auto;padding:12px;}
.page-h{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.page-h h2{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;}
.page-cnt{font-size:12px;color:var(--ink2);background:var(--b);padding:3px 9px;border-radius:20px;font-family:'Syne',sans-serif;font-weight:700;}
.arch-table{background:var(--w);border-radius:12px;border:1px solid var(--b);overflow:hidden;}
.arch-row{display:grid;grid-template-columns:1fr 110px 80px 70px;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--b2);font-size:12px;}
.arch-row:last-child{border-bottom:none;}
.arch-row.head{background:var(--bg);font-size:10px;font-weight:700;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);padding:6px 14px;}
.arch-restore{font-size:11px;color:#1a5fc9;cursor:pointer;font-weight:600;}
.arch-restore:hover{text-decoration:underline;}
.arch-empty{text-align:center;padding:40px;color:var(--ink3);font-family:'Syne',sans-serif;font-size:13px;}

/* ── TEAM ── */
.team-wrap{flex:1;overflow-y:auto;padding:12px;}
.team-layout{display:grid;grid-template-columns:190px 1fr;gap:12px;min-height:100%;}
.team-list{background:var(--w);border-radius:12px;border:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;align-self:start;}
.team-list-h{padding:10px 12px 8px;border-bottom:1px solid var(--b2);font-family:'Syne',sans-serif;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:space-between;}
.team-items{overflow-y:auto;}
.team-item{padding:8px 12px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;display:flex;align-items:center;gap:8px;}
.team-item:hover{background:var(--bg);}
.team-item.active{background:#f5f2ec;border-left-color:var(--ink);}
.team-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0;}
.team-name{font-size:12px;font-weight:600;flex:1;}
.team-role{font-size:10px;color:var(--ink3);font-family:'Syne',sans-serif;}
.team-detail{display:flex;flex-direction:column;gap:10px;}
.team-detail-empty{background:var(--w);border-radius:12px;border:1px solid var(--b);padding:40px;text-align:center;color:var(--ink3);font-family:'Syne',sans-serif;font-size:13px;}
.team-person-head{background:var(--w);border-radius:12px;border:1px solid var(--b);padding:14px 16px;display:flex;align-items:center;gap:12px;}
.team-person-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;font-family:'Syne',sans-serif;flex-shrink:0;}
.team-person-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;border:none;outline:none;background:transparent;color:var(--ink);flex:1;}
.team-person-role{font-size:12px;color:var(--ink3);border:none;outline:none;background:transparent;font-family:'Karla',sans-serif;width:100%;margin-top:2px;}
.team-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.team-card{background:var(--w);border-radius:12px;border:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;}
.team-card-h{padding:10px 13px 8px;border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:8px;}
.team-card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;flex:1;}
.team-card-body{padding:9px 11px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;max-height:300px;}
.ptask{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;background:var(--bg);border-radius:7px;border:1px solid var(--b);cursor:pointer;transition:background .1s;}
.ptask:hover{background:#ece9e1;}
.ptask-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--b);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.ptask-check.done{background:var(--s-done);border-color:var(--s-done);color:#fff;font-size:9px;}
.ptask-text{font-size:12px;flex:1;line-height:1.4;}
.ptask-text.done{text-decoration:line-through;color:var(--ink3);}
.point-session{background:var(--w);border-radius:10px;border:1px solid var(--b);overflow:hidden;margin-bottom:6px;}
.point-session-h{padding:9px 13px 7px;border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:8px;background:var(--bg);}
.point-date{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;}
.point-body{padding:9px 13px;display:flex;flex-direction:column;gap:7px;}
.point-notes{font-size:12px;line-height:1.6;color:var(--ink2);white-space:pre-wrap;}
.point-task-line{display:flex;align-items:center;gap:6px;font-size:12px;}
.point-task-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.new-point-form{background:var(--w);border-radius:12px;border:2px solid var(--brand);overflow:hidden;}
.new-point-h{padding:9px 13px 7px;border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:8px;background:#f9f0f4;}
.np-textarea{width:100%;padding:10px 13px;border:none;outline:none;font-family:'Karla',sans-serif;font-size:13px;background:#fff;color:var(--ink);resize:none;min-height:75px;line-height:1.6;}
.np-task-add{display:flex;gap:6px;padding:7px 13px;border-top:1px solid var(--b2);}
.np-tasks{padding:0 13px 7px;display:flex;flex-direction:column;gap:4px;}
.np-task-item{display:flex;align-items:center;gap:6px;font-size:12px;padding:3px 0;}
.np-actions{padding:7px 13px 9px;border-top:1px solid var(--b2);display:flex;gap:6px;justify-content:flex-end;}

/* ── CHECKLIST ── */
.checklist-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.checklist-toolbar{padding:10px 14px;border-bottom:1px solid var(--b2);display:flex;gap:8px;align-items:center;flex-shrink:0;background:var(--w);}
.checklist-table-wrap{flex:1;overflow:auto;}
.cl-table{border-collapse:collapse;width:100%;min-width:max-content;}
.cl-table th{background:var(--brand);color:#fff;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;white-space:nowrap;position:sticky;top:0;z-index:10;}
.cl-table th:first-child{left:0;z-index:20;width:140px;background:var(--ink);}
.cl-table th:nth-child(2){left:140px;z-index:20;background:var(--ink);}
.cl-table td{border:1px solid var(--b);padding:6px 8px;font-size:12px;vertical-align:middle;white-space:nowrap;}
.cl-table td:first-child{font-weight:700;background:var(--bg);font-family:'Syne',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink2);position:sticky;left:0;z-index:5;border-right:2px solid var(--b);}
.cl-table td:nth-child(2){font-size:12px;background:var(--w);position:sticky;left:140px;z-index:5;min-width:160px;border-right:2px solid var(--b);}
.cl-table tr:hover td{background:#f9f7f4;}
.cl-table tr:hover td:first-child{background:var(--bg);}
.cl-table tr:hover td:nth-child(2){background:#f9f7f4;}
.cl-cat-row td{background:var(--bg)!important;font-weight:800!important;font-size:11px!important;color:var(--ink)!important;border-top:2px solid var(--b)!important;}
.cl-status{display:inline-flex;align-items:center;justify-content:center;width:100%;cursor:pointer;}
.cl-btn{padding:3px 8px;border-radius:5px;border:none;font-size:11px;font-family:'Karla',sans-serif;font-weight:600;cursor:pointer;transition:all .12s;min-width:72px;text-align:center;}
.cl-btn.ok{background:var(--s-done-bg);color:var(--s-done);}
.cl-btn.wip{background:var(--s-wip-bg);color:var(--s-wip);}
.cl-btn.todo{background:var(--bg);color:var(--ink3);border:1px solid var(--b);}
.cl-btn.na{background:var(--b);color:var(--ink3);font-style:italic;}

/* ── DETAIL PANEL ── */
.detail{width:285px;flex-shrink:0;background:var(--w);border-left:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;}
.detail.hidden{display:none;}
.dhead{padding:10px 12px 8px;border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.dhead-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);font-family:'Syne',sans-serif;}
.dclose{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--ink3);font-size:18px;padding:1px 5px;border-radius:5px;line-height:1;}
.dclose:hover{background:var(--bg);color:var(--ink);}
.dbody{flex:1;overflow-y:auto;padding:11px 12px;display:flex;flex-direction:column;gap:10px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);font-family:'Syne',sans-serif;}
.fi{padding:7px 9px;border:1px solid var(--b);border-radius:7px;font-family:'Karla',sans-serif;font-size:13px;background:var(--bg);color:var(--ink);outline:none;width:100%;transition:border-color .15s;}
.fi:focus{border-color:var(--ink);background:#fff;}
textarea.fi{resize:vertical;min-height:65px;line-height:1.5;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.sbtn{padding:6px 7px;border-radius:6px;border:1.5px solid var(--b);font-family:'Karla',sans-serif;font-size:11px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--ink2);text-align:center;transition:all .15s;}
.sbtn.on[data-s="todo"]{background:var(--s-todo-bg);color:var(--s-todo);border-color:var(--s-todo);}
.sbtn.on[data-s="wip"]{background:var(--s-wip-bg);color:var(--s-wip);border-color:var(--s-wip);}
.sbtn.on[data-s="done"]{background:var(--s-done-bg);color:var(--s-done);border-color:var(--s-done);}
.sbtn.on[data-s="blocked"]{background:var(--s-block-bg);color:var(--s-block);border-color:var(--s-block);}
.dgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;}
.dbtn{padding:6px 5px;border-radius:6px;border:1.5px solid var(--b);font-family:'Karla',sans-serif;font-size:11px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--ink2);text-align:center;transition:all .15s;}
.dbtn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.dbtn.on.dead{background:var(--dead-bg);color:var(--dead-c);border-color:var(--dead-c);}
.dfoot{padding:9px 12px;border-top:1px solid var(--b2);flex-shrink:0;}
.bdel{background:#fee2e2;color:#b91c1c;border:none;border-radius:7px;padding:7px 13px;font-family:'Karla',sans-serif;font-size:12px;font-weight:700;cursor:pointer;width:100%;}
.bdel:hover{opacity:.8;}
</style>
</head>
<body>
<header>
  <h1>⬛ TÂCHES</h1>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('events',this)">Événements</button>
    <button class="nav-tab" onclick="switchView('tasks',this)">Tâches</button>
    <button class="nav-tab" onclick="switchView('week',this)">Semaine</button>
    <button class="nav-tab" onclick="switchView('checklist',this)">Checklist</button>
    <button class="nav-tab" onclick="switchView('team',this)">Équipe</button>
    <button class="nav-tab" onclick="switchView('calendar',this)">Calendrier</button>
    <button class="nav-tab" onclick="switchView('archive',this)">Archives</button>
  </div>
  <div class="hstats">
    <span class="hstat">🔥 <b id="hs-today">0</b></span>
    <span class="hstat">🚨 <b id="hs-dead">0</b></span>
    <span class="hstat">📋 <b id="hs-total">0</b></span>
  </div>
  <button id="overdueBtn" style="display:none;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;border:none;background:#fde8e8;color:#b91c1c;font-family:'Karla',sans-serif;font-size:11px;font-weight:700;cursor:pointer;"></button>
  <div class="hactions">
    <div class="hdate" id="hdate"></div>
    <button class="hbtn imp" onclick="triggerImport()">⬆ Importer</button>
    <button class="hbtn" onclick="exportData()">⬇ Exporter</button>
    <input type="file" id="importFile" accept=".json" onchange="importData(event)"/>
  </div>
</header>

<div class="app">

  <!-- EVENTS -->
  <div class="view active" id="view-events">
    <div class="events-outer">
      <div class="events-main">
        <div style="display:flex;flex-direction:column;gap:12px;height:100%;">
          <div class="deadline-encart">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
              <span>🚨</span>
              <span style="font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--dead-c);">Deadlines</span>
              <span id="deadlineCount" style="font-size:10px;background:var(--dead-c);color:#fff;padding:1px 7px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;">0</span>
            </div>
            <div id="deadlineList"></div>
          </div>
          <div class="events-layout" style="flex:1;min-height:0;">
            <div class="ev-list">
              <div class="ev-list-h">
                <span>Événements</span>
                <div style="display:flex;gap:4px;">
                  <button onclick="toggleEvSort()" id="evSortBtn" style="font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid var(--b);background:var(--bg);cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;color:var(--ink3);">A→Z</button>
                  <button class="btn btn-ink" style="font-size:11px;padding:4px 8px;" onclick="addEvent()">+</button>
                </div>
              </div>
              <div class="ev-items" id="evItems"></div>
            </div>
            <div class="ev-detail" id="evDetail"><div class="ev-detail-empty">← Sélectionne un événement</div></div>
          </div>
        </div>
      </div>
      <div class="today-col-wrap">
        <div class="today-col-head">
          <span>🔥</span>
          <span class="today-col-title">Aujourd'hui</span>
          <span id="today-col-count" style="margin-left:auto;font-size:10px;background:var(--today-bg);color:var(--today-c);padding:2px 7px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;">0</span>
        </div>
        <div class="today-col-body" id="todayColBody"></div>
      </div>
    </div>
  </div>

  <!-- TÂCHES -->
  <div class="view" id="view-tasks">
    <div class="tasks-view">
      <div class="tasks-main">
        <div class="tasks-toolbar">
          <input class="inp" id="tFilter" placeholder="Filtrer…" oninput="renderTasksView()" style="max-width:200px;"/>
          <select class="filter-select" id="tProjFilter" onchange="renderTasksView()">
            <option value="">Tous les projets</option>
          </select>
          <select class="filter-select" id="tStatusFilter" onchange="renderTasksView()">
            <option value="">Tous statuts</option>
            <option value="todo">À faire</option>
            <option value="wip">En cours</option>
            <option value="blocked">Bloqué</option>
          </select>
          <span style="font-size:10px;color:var(--ink3);font-family:'Syne',sans-serif;margin-left:auto;" id="taskCount"></span>
        </div>
        <div class="tasks-list" id="tasksList" ondragover="event.preventDefault()" ondrop="dropUnplan(event)"></div>
        <div class="tasks-add">
          <div class="tasks-add-row">
            <input class="inp" id="niTask" placeholder="Nouvelle tâche…" style="flex:1;" onkeydown="if(event.key==='Enter')addTask()"/>
            <button class="btn btn-ink" onclick="addTask()">+ Ajouter</button>
          </div>
          <div class="tasks-add-row2">
            <select class="inp" id="niProj" style="flex:1;"></select>
            <input class="inp" id="niProj2" placeholder="Nouveau projet…" style="flex:1;" onkeydown="if(event.key==='Enter')addProject()"/>
            <button class="btn btn-soft" onclick="addProject()">+</button>
          </div>
        </div>
      </div>
      <!-- Detail panel is appended by JS -->
    </div>
  </div>

  <!-- WEEK -->
  <div class="view" id="view-week">
    <div class="week-wrap">
      <div class="week-nav">
        <button onclick="weekPrev()">← Préc.</button>
        <h2 id="weekTitle"></h2>
        <button onclick="weekNext()">Suiv. →</button>
        <button class="wn-today" onclick="weekToday()">Cette semaine</button>
      </div>
      <div class="week-grid" id="weekGrid"></div>
    </div>
  </div>

  <!-- CHECKLIST -->
  <div class="view" id="view-checklist">
    <div class="checklist-wrap">
      <div class="checklist-toolbar">
        <span style="font-family:'Syne',sans-serif;font-size:12px;font-weight:800;">Checklist Logistique</span>
        <button class="btn btn-soft" style="font-size:11px;margin-left:auto;" onclick="addChecklistCategory()">+ Catégorie</button>
        <button class="btn btn-soft" style="font-size:11px;" onclick="addChecklistItem()">+ Étape</button>
      </div>
      <div class="checklist-table-wrap">
        <table class="cl-table" id="clTable"></table>
      </div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="view" id="view-calendar">
    <div class="calendar-wrap">
      <div class="cal-nav">
        <button onclick="calPrev()">← Précédent</button>
        <h2 id="calTitle"></h2>
        <button onclick="calNext()">Suivant →</button>
        <button style="margin-left:auto;" onclick="calToday()">Aujourd'hui</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <!-- ARCHIVE -->
  <div class="view" id="view-archive">
    <div class="archive-wrap">
      <div class="page-h">
        <h2>Archives</h2>
        <span class="page-cnt" id="archCount">0</span>
        <button class="btn btn-soft" style="margin-left:auto;font-size:11px;" onclick="clearArchive()">Tout effacer</button>
      </div>
      <div id="archContent"></div>
    </div>
  </div>

  <!-- TEAM -->
  <div class="view" id="view-team">
    <div class="team-wrap">
      <div class="team-layout">
        <div class="team-list">
          <div class="team-list-h">
            <span>Équipe</span>
            <button class="btn btn-ink" style="font-size:11px;padding:4px 8px;" onclick="addMember()">+</button>
          </div>
          <div class="team-items" id="teamItems"></div>
        </div>
        <div class="team-detail" id="teamDetail"><div class="team-detail-empty">← Sélectionne une personne</div></div>
      </div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail hidden" id="detailPanel">
    <div class="dhead">
      <span class="dhead-lbl">Détail</span>
      <button class="dclose" onclick="closeDetail()">×</button>
    </div>
    <div class="dbody">
      <div class="fg"><label class="fl">Titre</label><input class="fi" id="d-title" oninput="upd('text',this.value)"/></div>
      <div class="fg">
        <label class="fl">Statut</label>
        <div class="sgrid">
          <button class="sbtn" data-s="todo" onclick="upd('status','todo')">⬜ À faire</button>
          <button class="sbtn" data-s="wip" onclick="upd('status','wip')">🔄 En cours</button>
          <button class="sbtn" data-s="done" onclick="upd('status','done')">✅ Terminé</button>
          <button class="sbtn" data-s="blocked" onclick="upd('status','blocked')">🚫 Bloqué</button>
        </div>
      </div>
      <div class="fg"><label class="fl">Planifier</label><div class="dgrid" id="d-buckets"></div></div>
      <div class="fg"><label class="fl">Projet</label><select class="fi" id="d-proj" onchange="upd('project',this.value)"></select></div>
      <div class="fg"><label class="fl">Échéance</label><input class="fi" type="date" id="d-due" onchange="upd('due',this.value)"/></div>
      <div class="fg"><label class="fl">Commentaires</label><textarea class="fi" id="d-comments" placeholder="Notes, liens…" oninput="upd('comments',this.value)"></textarea></div>
    </div>
    <div class="dfoot"><button class="bdel" onclick="deleteActive()">🗑 Supprimer définitivement</button></div>
  </div>

</div>
<script>
// ── CONSTANTS ──
const PC=['#e05c5c','#d97706','#7c3aed','#1d4ed8','#047857','#be185d','#0891b2','#65a30d','#c05621','#0e7490','#7c2d12','#be123c'];
const EV_COLORS=['#e05c5c','#d97706','#7c3aed','#1d4ed8','#047857','#be185d','#0891b2','#65a30d','#c05621','#0e7490','#64748b','#be123c','#15803d','#7e22ce','#b45309'];
const SL={todo:'À faire',wip:'En cours',done:'Terminé',blocked:'Bloqué'};
const SC={todo:'p-todo',wip:'p-wip',done:'p-done',blocked:'p-blocked'};
const DAY_NAMES=['Lun','Mar','Mer','Jeu','Ven'];

// Checklist template
const CL_TEMPLATE=[
  {cat:'Atelier Image',items:['Demander devis & Deadline','Faire signer devis','Envoyer le devis signé','Faire le visuel','Envoyer le visuel','Valider le BAT','Réception des éléments','Facture dans la drop','Facture sur Spendesk']},
  {cat:'Déléage',items:['Demander devis & Deadline','Faire signer devis','Envoyer le devis signé','Faire le visuel','Envoyer le visuel','Valider le BAT','Réception des éléments','Facture dans la drop','Facture sur Spendesk']},
  {cat:'Ubiqus',items:['Demander devis & Deadline','Faire signer devis','Envoyer le devis signé','Faire le visuel','Envoyer le visuel','Envoyer la liste','Valider le BAT','Réception des éléments','Facture dans la drop','Facture sur Spendesk']},
  {cat:'Trophée',items:['Faire le visuel','Demander carte virtuelle','Commander','Demander Facture','Réception des éléments']},
  {cat:'Impression LOSAM',items:['FDR Animateur','FDR Intervenants','FDR Deloitte','FDR Communication','FDR Ritz / George V','FDR Régie','Trombinoscope','Books équipe','Feuille pitcheur','Feuille signalétique','Cadre Whatsapp','Chevalet Linkedin']},
  {cat:'Imprimeur',items:['Chevalet Participants','Chevalet Partenaires','Plan d\'implantation']},
  {cat:'Autres',items:['Slides de fond','Acheter Champagne']}
];

// ── GLOBALS ──
var syncTimeout=null;
var activeId=null,dragId=null,activeEvId=null,activeMemberId=null;
var currentSort='default',currentTaskFilter='',currentProjFilter='',currentStatusFilter='';
var weekOffset=0;
var calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
var colorPickerOpen=null;
var evSortAlpha=false;
var todayDragIdx=null;

// ── SAVE / SYNC ──
function save(){
  state.lastSaved=Date.now();
  localStorage.setItem('todo6',JSON.stringify(state));
  clearTimeout(syncTimeout);
  syncTimeout=setTimeout(syncToKV,1500);
}
async function syncToKV(){
  try{await fetch('/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({todo5:state})});}catch(e){}
}
async function loadFromKV(){
  try{
    const res=await fetch('/data');if(!res.ok)return;
    const data=await res.json();
    if(data.todo5&&data.todo5.tasks){
      if((data.todo5.lastSaved||0)>(state.lastSaved||0)){
        state=data.todo5;
        localStorage.setItem('todo6',JSON.stringify(state));
        render();
      }
    }
  }catch(e){}
}

// ── STATE INIT ──
let state=JSON.parse(localStorage.getItem('todo6')||localStorage.getItem('todo5')||'null')||{
  tasks:[],archived:[],projects:[],events:[],team:[],
  checklist:{},
  nextId:1,nextEvId:1,nextMemberId:1
};
// Ensure fields
if(!state.events)state.events=[];
if(!state.team)state.team=[];
if(!state.nextEvId)state.nextEvId=1;
if(!state.nextMemberId)state.nextMemberId=1;
if(!state.checklist)state.checklist={};
// Remove flags from state
delete state.flags;

// Fix duplicate event IDs
(function(){
  const seen=new Set();let maxId=0;
  state.events.forEach(e=>{if(e.id>maxId)maxId=e.id;});
  state.events.forEach(e=>{if(seen.has(e.id)){maxId++;e.id=maxId;}seen.add(e.id);});
  state.nextEvId=maxId+1;
})();

// ── HELPERS ──
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pcol(name){const ev=state.events.find(e=>e.name===name);if(ev&&ev.color)return ev.color;const i=state.projects.indexOf(name);return i>=0?PC[i%PC.length]:'#ccc';}
function todayISO(){return isoDate(new Date());}
function getMonday(offset=0){const now=new Date();const dow=now.getDay();const diff=dow===0?-6:1-dow;return new Date(now.getFullYear(),now.getMonth(),now.getDate()+diff+offset*7);}
function isoDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isUrgent(t){if(!t.due||t.status==='done')return false;const due=new Date(t.due);due.setHours(0,0,0,0);const tod=new Date();tod.setHours(0,0,0,0);return due<=tod;}
function dueInfo(due){
  if(!due)return null;
  const d=new Date(due);d.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);
  const diff=Math.round((d-t)/86400000);
  const cls=diff<0?'overdue':diff===0?'dtoday':'normal';
  const label=diff<0?`Retard ${Math.abs(diff)}j`:diff===0?'Aujourd\'hui':diff===1?'Demain':d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  return{cls,label};
}

// ── TASKS ──
function addTask(){
  const text=document.getElementById('niTask').value.trim();if(!text)return;
  const proj=document.getElementById('niProj').value;
  const t={id:state.nextId++,text,project:proj,bucket:null,status:'todo',due:'',comments:''};
  state.tasks.push(t);save();
  document.getElementById('niTask').value='';
  render();openDetail(t.id);
}
function addProject(){
  const name=document.getElementById('niProj2').value.trim();
  if(!name||state.projects.includes(name))return;
  state.projects.push(name);save();document.getElementById('niProj2').value='';
  syncProjectsToEvents();render();
}
function deleteProject(name){
  state.projects=state.projects.filter(p=>p!==name);
  state.tasks.forEach(t=>{if(t.project===name)t.project='';});
  save();render();
}

// Quick add task from event detail
function quickAddTask(evName){
  const el=document.getElementById('ev-quick-inp-'+CSS.escape(evName));
  if(!el)return;
  const text=el.value.trim();if(!text)return;
  const t={id:state.nextId++,text,project:evName,bucket:null,status:'todo',due:'',comments:''};
  state.tasks.push(t);save();el.value='';
  renderEventDetail();render();
}

function sortedTasks(){
  let tasks=[...state.tasks].filter(t=>t.status!=='done');
  if(currentTaskFilter)tasks=tasks.filter(t=>t.text.toLowerCase().includes(currentTaskFilter.toLowerCase())||t.project.toLowerCase().includes(currentTaskFilter.toLowerCase()));
  if(currentProjFilter)tasks=tasks.filter(t=>t.project===currentProjFilter);
  if(currentStatusFilter)tasks=tasks.filter(t=>t.status===currentStatusFilter);
  if(currentSort==='date')return tasks.sort((a,b)=>(a.due||'9999')<(b.due||'9999')?-1:1);
  if(currentSort==='project')return tasks.sort((a,b)=>(a.project||'').localeCompare(b.project||''));
  return tasks;
}

// ── DETAIL ──
function renderDetailBuckets(t){
  const el=document.getElementById('d-buckets');if(!el)return;
  const mon=getMonday(weekOffset);
  const days=[];
  for(let i=0;i<5;i++){
    const d=new Date(mon);d.setDate(d.getDate()+i);
    const iso=isoDate(d);
    const isT=iso===todayISO();
    days.push({val:iso,lbl:isT?'Aujourd\'hui':DAY_NAMES[i]+' '+d.getDate()});
  }
  days.push({val:'dead',lbl:'🚨 Deadline',isDead:true});
  days.push({val:'',lbl:'📋 Non planifié'});

function upd(field,value){
  if(!activeId)return;
  const t=state.tasks.find(t=>t.id===activeId);if(!t)return;
  if(field==='bucket')t.bucket=value||null;else t[field]=value;
  if(field==='status'&&value==='done'){archiveTask(t.id);return;}
  save();
  if(field==='status')document.querySelectorAll('.sbtn').forEach(b=>b.classList.toggle('on',b.dataset.s===value));
  if(field==='bucket')renderDetailBuckets(t);

function archiveTask(id){

function deleteActive(){

function restoreTask(id){

// ── WEEK ──
function weekPrev(){weekOffset--;renderWeek();}
function weekNext(){weekOffset++;renderWeek();}
function weekToday(){weekOffset=0;renderWeek();}
function renderWeek(){
  const mon=getMonday(weekOffset);
  const todayStr=todayISO();
  const months=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  const endFri=new Date(mon);endFri.setDate(endFri.getDate()+4);
  document.getElementById('weekTitle').textContent=`${mon.getDate()} ${months[mon.getMonth()]} — ${endFri.getDate()} ${months[endFri.getMonth()]} ${endFri.getFullYear()}`;
  const days=[];
  for(let i=0;i<5;i++){const d=new Date(mon);d.setDate(d.getDate()+i);days.push({iso:isoDate(d),d,name:DAY_NAMES[i],isToday:isoDate(d)===todayStr});}
  const dayMap={};days.forEach(d=>{dayMap[d.iso]=[];});
  const unplanned=[],deadTasks=[];
  state.tasks.forEach(t=>{
    if(t.bucket==='dead'){
      deadTasks.push(t);
      let dueISO=t.due||'';
      if(dueISO&&dayMap[dueISO]!==undefined)dayMap[dueISO].push(t);
      else unplanned.push(t);
      return;
    }
    if(t.due&&dayMap[t.due]!==undefined){dayMap[t.due].push(t);return;}
    if(t.bucket&&dayMap[t.bucket]!==undefined){dayMap[t.bucket].push(t);return;}
    if(!t.bucket&&!t.due){unplanned.push(t);return;}
    if((t.due&&dayMap[t.due]===undefined)||(t.bucket&&dayMap[t.bucket]===undefined&&!t.due))unplanned.push(t);
  });
  // urgent dead → today
  if(dayMap[todayStr]){
    const ids=new Set(dayMap[todayStr].map(t=>t.id));
    deadTasks.filter(t=>isUrgent(t)).forEach(t=>{if(!ids.has(t.id))dayMap[todayStr].push(t);});
  }
  const grid=document.getElementById('weekGrid');
  grid.style.gridTemplateColumns=`repeat(5,1fr) 150px`;
  const cardHtml=(t)=>{
    const color=t.project?pcol(t.project):'var(--b)';
    const di=dueInfo(t.due);const urgent=isUrgent(t);const isDead=t.bucket==='dead';
    const dueHtml=di?`<span class="${urgent||isDead?'kdue-red':'kdue-norm'}">${urgent?'🚨 ':isDead?'⏰ ':''}${di.label}</span>`:'';
    return`<div class="wcard ${activeId===t.id?'active':''} ${isDead?'is-dead':''}" data-tid="${t.id}"
      draggable="true" style="border-left-color:${isDead||urgent?'var(--dead-c)':color}"
      ondragstart="startDrag(event,${t.id})" onclick="openDetail(${t.id})">
      <div class="wname ${t.status==='done'?'done':''}">${esc(t.text)}</div>
      <div class="wmeta">
        ${t.project?`<span style="font-size:10px;font-family:Syne,sans-serif;color:${color};font-weight:700;">${esc(t.project)}</span>`:''}
        ${dueHtml}<span class="pill ${SC[t.status||'todo']}">${SL[t.status||'todo']}</span>
        ${t.comments?'<span style="font-size:10px;color:var(--ink3);">💬</span>':''}
      </div>
    </div>`;
  };
  grid.innerHTML=days.map(d=>`
    <div class="wcol ${d.isToday?'today-col':''}">
      <div class="wcol-head"><div class="wcol-day">${d.name}</div><div class="wcol-date ${d.isToday?'is-today':''}">${d.d.getDate()}</div></div>
      <div class="wcol-body" ondragover="dzOver(event)" ondragleave="dzLeave(event)" ondrop="dzDrop(event,'${d.iso}')">
        ${dayMap[d.iso].length===0?'<div class="wempty">—</div>':dayMap[d.iso].map(t=>cardHtml(t)).join('')}
      </div>
    </div>`).join('')+
  `<div class="wcol unplan-col">
    <div class="wcol-head"><div class="wcol-day">Non planifié</div><div class="wcol-date" style="font-size:13px;color:var(--ink3);">📋</div></div>
    <div class="wcol-body" ondragover="dzOver(event)" ondragleave="dzLeave(event)" ondrop="dzDrop(event,'')">
      ${unplanned.length===0?'<div class="wempty">—</div>':unplanned.map(t=>cardHtml(t)).join('')}
    </div>
  </div>`;
}

function clCycle(catIdx,itemIdx,projName){
  const key=`${catIdx}_${itemIdx}_${projName}`;
  const cur=state.checklist[key]||'todo';
  const next={todo:'wip',wip:'ok',ok:'na',na:'todo'}[cur]||'todo';
  state.checklist[key]=next;
  save();
  // Update just the button
  const btn=document.getElementById(`cl_${catIdx}_${itemIdx}_${CSS.escape(projName)}`);
  if(btn){
    btn.className=`cl-btn ${next}`;
    btn.textContent={todo:'—',wip:'En cours',ok:'✓ OK',na:'N/A'}[next]||'—';
  }
}
function renderChecklist(){
  const table=document.getElementById('clTable');if(!table)return;
  const def=getChecklistDef();
  // Only show projects that have events
  const projs=state.projects.filter(p=>state.events.find(e=>e.name===p));
  if(projs.length===0){
    table.innerHTML='<tr><td style="padding:20px;color:var(--ink3);font-family:Syne,sans-serif;font-size:12px;">Ajoute des projets/événements pour voir la checklist</td></tr>';
    return;
  }
  let html=`<thead><tr><th>Prestataire</th><th>Étape</th>${projs.map(p=>{
    const ev=state.events.find(e=>e.name===p);
    const col=ev?ev.color:'#ccc';
    // Abbreviation : initiales
    const abbr=p.split(' ').filter(w=>w.length>2).map(w=>w[0]).join('').toUpperCase().slice(0,4)||p.slice(0,4).toUpperCase();
    return`<th style="background:${col};min-width:80px;" title="${esc(p)}">${abbr}</th>`;
  }).join('')}</tr></thead><tbody>`;
  def.forEach((cat,ci)=>{
    html+=`<tr class="cl-cat-row"><td colspan="${projs.length+2}">${esc(cat.cat)}</td></tr>`;
    cat.items.forEach((item,ii)=>{
      html+=`<tr><td></td><td>${esc(item)}</td>`;
      projs.forEach(p=>{
        const key=`${ci}_${ii}_${p}`;
        const st=state.checklist[key]||'todo';
        const label={todo:'—',wip:'En cours',ok:'✓ OK',na:'N/A'}[st]||'—';
        const safeId=`cl_${ci}_${ii}_${p.replace(/[^a-z0-9]/gi,'_')}`;
        html+=`<td><div class="cl-status"><button class="cl-btn ${st}" id="${safeId}" onclick="clCycle(${ci},${ii},'${p.replace(/'/g,"\\'")}')">${label}</button></div></td>`;
      });
      html+='</tr>';
    });
  });
  html+='</tbody>';
  table.innerHTML=html;
}

// ── CALENDAR ──
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function calToday(){const d=new Date();calYear=d.getFullYear();calMonth=d.getMonth();renderCalendar();}
function renderCalendar(){
  const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('calTitle').textContent=`${months[calMonth]} ${calYear}`;
  const grid=document.getElementById('calGrid');
  const todayStr=todayISO();
  const taskMap={};
  state.tasks.forEach(t=>{
    if(t.bucket==='dead'&&t.due){
      if(!taskMap[t.due])taskMap[t.due]=[];
      taskMap[t.due].push({...t,_dead:true});
      return;
    }
    let cd=t.due;
    if(!cd&&t.bucket&&t.bucket.includes('-'))cd=t.bucket;
    if(!cd)return;
    if(!taskMap[cd])taskMap[cd]=[];
    taskMap[cd].push(t);
  });
  const first=new Date(calYear,calMonth,1);
  let sdow=first.getDay();sdow=sdow===0?6:sdow-1;
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const pd=new Date(calYear,calMonth,0).getDate();
  const DN=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  let html=DN.map(d=>`<div class="cal-dh">${d}</div>`).join('');
  let cells=[];
  for(let i=sdow-1;i>=0;i--)cells.push({d:pd-i,m:calMonth-1,o:true});
  for(let i=1;i<=dim;i++)cells.push({d:i,m:calMonth,o:false});
  const rem=42-cells.length;
  for(let i=1;i<=rem;i++)cells.push({d:i,m:calMonth+1,o:true});
  cells.forEach(cell=>{
    const m=((cell.m%12)+12)%12;
    const y=cell.m<0?calYear-1:cell.m>11?calYear+1:calYear;
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(cell.d).padStart(2,'0')}`;
    const isT=ds===todayStr;
    const tasks=taskMap[ds]||[];
    const chips=tasks.slice(0,3).map(t=>{
      const color=t.project?pcol(t.project):'#999';
      const isDead=t._dead;
      return`<div class="cal-chip ${isDead?'dead':''}" style="${isDead?'':  `background:${color}18;color:${color};`}" onclick="openDetail(${t.id})">${isDead?'⏰ ':''}${esc(t.text)}</div>`;
    }).join('');
    html+=`<div class="cal-day ${cell.o?'om':''} ${isT?'td':''}">
      <div class="cal-dnum">${cell.d}</div>${chips}
      ${tasks.length>3?`<div style="font-size:9px;color:var(--ink3);font-family:Syne,sans-serif;">+${tasks.length-3}</div>`:''}
    </div>`;
  });
  grid.innerHTML=html;
}

          <div style="width:20px;height:20px;border-radius:50%;background:${mc}22;color:${mc};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;font-family:'Syne',sans-serif;">${initials(m.name)}</div>
          <span style="font-size:12px;font-weight:700;">${esc(m.name)}</span>
          <span style="font-size:10px;color:var(--ink3);margin-left:auto;">${mt.length} tâche${mt.length!==1?'s':''}</span>
        </div>

  const deadSectionHtml=deadTasks.length===0?'':groupPointTasksHtml?'':

        const urgent=isUrgent(t);

        <div style="width:6px;height:6px;border-radius:50%;background:${col};flex-shrink:0;margin-top:3px;"></div>

          <span class="pill ${SC[t.status||'todo']}">${SL[t.status||'todo']}</span>

  const safeEvName=ev.name.replace(/[^a-z0-9]/gi,'_');
  const quickAddHtml=`<div class="ev-quick-add">

      <div style="position:relative;">
        <div class="ev-color-btn" style="background:${col};" onclick="toggleColorPicker(${ev.id})"></div>

      <button class="btn btn-soft" style="font-size:11px;padding:4px 8px;" onclick="deleteEvent(${ev.id})">Supprimer</button>
    </div>
    <div class="ev-body">
      ${notesSectionHtml}
      <div>
        <div class="ev-lbl">Tâches (${normalTasks.length})</div>
        ${normalTasksHtml}
        ${quickAddHtml}
      </div>
      ${deadTasks.length>0?`<div>
        <div class="ev-lbl" style="color:var(--dead-c);">🚨 Deadlines (${deadTasks.length})</div>
        ${deadTasks.map(t=>{
          const urgent=isUrgent(t);
          const dateStr=new Date(t.due).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
          return`<div class="ev-task-row" onclick="openDetail(${t.id})" style="${urgent?'background:#fff0f0;border-color:var(--dead-c);':''}">
            <div style="flex:1;">
              <div class="ev-task-name">${urgent?'🚨 ':'⏰ '}${esc(t.text)}</div>
              <div style="display:flex;gap:5px;margin-top:2px;">
                <span style="font-size:11px;font-family:'Syne',sans-serif;font-weight:700;color:${urgent?'var(--dead-c)':'var(--ink2)'};">${dateStr}</span>
                <span class="pill ${SC[t.status||'todo']}">${SL[t.status||'todo']}</span>
              </div>
            </div>

        }).join('')}

}

// ── TODAY COL ──
var todayDragIdx=null;
function todayDragStart(e,idx){todayDragIdx=idx;e.dataTransfer.effectAllowed='move';}
function todayDragOver(e,idx){
  e.preventDefault();
  document.querySelectorAll('.today-task-card').forEach((el,i)=>el.classList.toggle('drag-over-today',i===idx&&idx!==todayDragIdx));
}
function todayDrop(e,idx){
  e.preventDefault();
  document.querySelectorAll('.today-task-card').forEach(el=>el.classList.remove('drag-over-today'));
  if(todayDragIdx===null||todayDragIdx===idx)return;
  const today=todayISO();
  const todayTasks=state.tasks.filter(t=>t.bucket===today&&t.status!=='done');
  const moved=todayTasks[todayDragIdx];
  const fromIdx=state.tasks.indexOf(moved);
  const target=todayTasks[idx];
  const toIdx=state.tasks.indexOf(target);
  state.tasks.splice(fromIdx,1);state.tasks.splice(toIdx,0,moved);
  todayDragIdx=null;save();renderTodayCol();
}
function renderTodayCol(){
  const today=todayISO();
  const tasks=state.tasks.filter(t=>t.bucket===today&&t.status!=='done');
  const el=document.getElementById('todayColBody');
  const cnt=document.getElementById('today-col-count');
  if(!el)return;
  if(cnt)cnt.textContent=tasks.length;
  if(tasks.length===0){el.innerHTML='<div class="today-empty">Aucune tâche<br>pour aujourd\'hui</div>';return;}
  el.innerHTML=tasks.map((t,i)=>{
    const color=t.project?pcol(t.project):'var(--b)';
    return`<div class="today-task-card" style="border-left-color:${color};" draggable="true"
      ondragstart="todayDragStart(event,${i})" ondragover="todayDragOver(event,${i})" ondrop="todayDrop(event,${i})">
      <span class="today-drag-handle">⠿</span>
      <div style="flex:1;min-width:0;" onclick="openDetail(${t.id})">
        <div class="today-task-name">${esc(t.text)}</div>
        ${t.project?`<div class="today-task-proj" style="color:${color};">${esc(t.project)}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── OVERDUE ──
function checkOverdueTasks(){
  const today=todayISO();
  const overdue=state.tasks.filter(t=>t.bucket&&t.status!=='done'&&t.bucket.match(/^\d{4}-\d{2}-\d{2}$/)&&t.bucket<today);
  const btn=document.getElementById('overdueBtn');if(!btn)return;
  if(overdue.length===0){btn.style.display='none';return;}
  btn.style.display='flex';btn.textContent=`↩ ${overdue.length} en retard`;
  btn.onclick=()=>{
    const names=overdue.map(t=>`• ${t.text}`).join('\n');
    if(confirm(`Reporter ${overdue.length} tâche${overdue.length>1?'s':''} à aujourd'hui ?\n\n${names}`)){
      overdue.forEach(t=>{t.bucket=today;});save();render();
    }
  };
}

// ── TEAM ──
const AVATAR_COLORS=['#e05c5c','#d97706','#7c3aed','#1d4ed8','#047857','#be185d','#0891b2','#65a30d'];
function avatarColor(i){return AVATAR_COLORS[i%AVATAR_COLORS.length];}
function initials(name){return(name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function addMember(){
  const name=prompt('Prénom et nom :');if(!name||!name.trim())return;
  const role=prompt('Rôle :')||'';
  state.team.push({id:state.nextMemberId++,name:name.trim(),role:role.trim(),tasks:[],points:[],nextTaskId:1});
  save();renderTeamList();openMember(state.team[state.team.length-1].id);
}
function deleteMember(id){
  if(!confirm('Supprimer ?'))return;
  state.team=state.team.filter(m=>m.id!==id);
  if(activeMemberId===id){activeMemberId=null;renderTeamDetail();}
  save();renderTeamList();
}
function openMember(id){activeMemberId=id;renderTeamList();renderTeamDetail();}
function updateMemberName(id,val){const m=state.team.find(m=>m.id===id);if(m){m.name=val;save();renderTeamList();}}
function updateMemberRole(id,val){const m=state.team.find(m=>m.id===id);if(m){m.role=val;save();}}
function toggleMemberTask(memberId,taskId){
  const m=state.team.find(m=>m.id===memberId);if(!m)return;
  const t=(m.tasks||[]).find(t=>t.id===taskId);if(!t)return;
  t.done=!t.done;save();renderTeamDetail();
}
function deleteMemberTask(memberId,taskId){
  const m=state.team.find(m=>m.id===memberId);if(!m)return;
  m.tasks=(m.tasks||[]).filter(t=>t.id!==taskId);save();renderTeamDetail();
}
function setMemberTaskProject(memberId,taskId,val){
  const m=state.team.find(m=>m.id===memberId);if(!m)return;
  const t=(m.tasks||[]).find(t=>t.id===taskId);if(!t)return;
  t.project=val;save();renderTeamDetail();
}
function addDirectTask(memberId){
  const el=document.getElementById('direct-task-inp');if(!el)return;
  const text=el.value.trim();if(!text)return;
  const projEl=document.getElementById('direct-task-proj');
  const proj=projEl?projEl.value:'';
  const m=state.team.find(m=>m.id===memberId);if(!m)return;
  if(!m.tasks)m.tasks=[];if(!m.nextTaskId)m.nextTaskId=1;
  m.tasks.push({id:m.nextTaskId++,text,done:false,due:'',project:proj,createdAt:todayISO()});
  save();el.value='';renderTeamDetail();
}
function goToMember(id){
  switchView('team',document.querySelectorAll('.nav-tab')[4]);
  openMember(id);
}

var newPointNotes='',newPointTasks=[],editingPointIdx=null,autosavePointTimeout=null;
function startNewPoint(memberId){
  newPointNotes='';newPointTasks=[];editingPointIdx=null;
  const m=state.team.find(m=>m.id===memberId);
  if(m&&m._draft){newPointNotes=m._draft.notes||'';newPointTasks=m._draft.tasks||[];}
  renderTeamDetail('new');
  setTimeout(()=>{const el=document.getElementById('np-notes');if(el){el.value=newPointNotes;el.focus();}},50);
}
function editPoint(memberId,pi){
  const m=state.team.find(m=>m.id===memberId);if(!m)return;
  const p=m.points[pi];if(!p)return;
  newPointNotes=p.notes||'';
  newPointTasks=(p.tasks||[]).map(t=>typeof t==='object'?t:{text:t.replace(/\s*\[.+?\]$/,'').trim(),project:(t.match(/\[(.+?)\]$/)||[])[1]||''});
  editingPointIdx=pi;renderTeamDetail('edit');
  setTimeout(()=>{const el=document.getElementById('np-notes');if(el){el.value=newPointNotes;el.focus();}},50);
}
function autosavePoint(memberId){
  clearTimeout(autosavePointTimeout);
  autosavePointTimeout=setTimeout(()=>{
    const el=document.getElementById('np-notes');if(!el)return;
    const m=state.team.find(t=>t.id===memberId);if(!m)return;
    if(!m._draft)m._draft={};
    m._draft.notes=el.value;m._draft.tasks=newPointTasks.slice();
    const ind=document.getElementById('autosave-ind');
    if(ind){ind.textContent='✓ Sauvegardé';ind.style.opacity='1';}
    setTimeout(()=>{const i=document.getElementById('autosave-ind');if(i)i.style.opacity='0';},2000);
  },800);
}
function cancelNewPoint(){newPointNotes='';newPointTasks=[];editingPointIdx=null;renderTeamDetail();}
function savePoint(memberId){
  const m=state.team.find(m=>m.id===memberId);if(!m)return;
  const notesEl=document.getElementById('np-notes');
  const notes=notesEl?notesEl.value.trim():'';
  if(!notes&&newPointTasks.length===0){alert('Ajoute des notes ou des tâches.');return;}
  if(!m.points)m.points=[];
  if(editingPointIdx!==null){
    m.points[editingPointIdx].notes=notes;m.points[editingPointIdx].tasks=newPointTasks.slice();
  } else {
    m.points.unshift({date:todayISO(),notes,tasks:newPointTasks.slice()});
    newPointTasks.forEach(pt=>{
      if(!m.tasks)m.tasks=[];if(!m.nextTaskId)m.nextTaskId=1;
      m.tasks.push({id:m.nextTaskId++,text:pt.text||pt,done:false,due:'',project:pt.project||'',createdAt:todayISO()});
    });
  }
  newPointNotes='';newPointTasks=[];editingPointIdx=null;
  delete m._draft;save();renderTeamDetail();
}
function addPointTask(){
  const el=document.getElementById('np-task-input');if(!el)return;
  const text=el.value.trim();if(!text)return;
  const projEl=document.getElementById('np-task-proj');
  newPointTasks.push({text,project:projEl?projEl.value:''});
  el.value='';if(projEl)projEl.value='';refreshPointTasksList();
}
function removePointTask(i){newPointTasks.splice(i,1);refreshPointTasksList();}
function refreshPointTasksList(){
  const tl=document.getElementById('np-tasks-list');if(!tl)return;
  tl.innerHTML=newPointTasks.map((t,i)=>{
    const txt=typeof t==='object'?t.text:t;
    const proj=typeof t==='object'?t.project:'';
    const pc=proj?pcol(proj):'';
    return`<div class="np-task-item">
      <span style="color:var(--ink3);font-size:11px;">→</span>
      <span style="flex:1;">${esc(txt)}</span>
      ${proj?`<span style="font-size:10px;font-family:'Syne',sans-serif;font-weight:700;color:${pc};background:${pc}18;padding:1px 5px;border-radius:5px;">${esc(proj)}</span>`:''}
      <span style="cursor:pointer;color:var(--ink3);font-size:11px;" onclick="removePointTask(${i})">✕</span>
    </div>`;

}
function deletePoint(memberId,pi){
  const m=state.team.find(m=>m.id===memberId);if(!m)return;
  if(!confirm('Supprimer ?'))return;
  m.points.splice(pi,1);save();renderTeamDetail();
}
function groupPointTasksHtml(tasks){
  const byProj={};const noProj=[];
  tasks.forEach(t=>{
    const txt=typeof t==='object'?t.text:t;
    const proj=typeof t==='object'?t.project||'':((t.match(/\[(.+?)\]$/)||[])[1]||'');
    const cleanTxt=typeof t==='string'?t.replace(/\s*\[.+?\]$/,'').trim():txt;
    if(proj){if(!byProj[proj])byProj[proj]=[];byProj[proj].push(cleanTxt);}
    else noProj.push(cleanTxt);
  });
  let html='';
  Object.entries(byProj).forEach(([proj,txts])=>{
    const pc=pcol(proj);
    html+=`<div style="margin-bottom:5px;">
      <div style="font-size:10px;font-weight:700;font-family:'Syne',sans-serif;color:${pc};text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;display:flex;align-items:center;gap:4px;">
        <span style="width:5px;height:5px;border-radius:50%;background:${pc};display:inline-block;"></span>${esc(proj)}
      </div>
      ${txts.map(txt=>`<div class="point-task-line"><div class="point-task-dot" style="background:${pc};"></div><span>${esc(txt)}</span></div>`).join('')}
    </div>`;
  });
  if(noProj.length>0)html+=`<div>${noProj.map(txt=>`<div class="point-task-line"><div class="point-task-dot" style="background:var(--ink3);"></div><span>${esc(txt)}</span></div>`).join('')}</div>`;
  return html;
}
function renderTeamList(){
  const el=document.getElementById('teamItems');if(!el)return;
  if(!state.team||state.team.length===0){el.innerHTML='<div style="padding:16px;color:var(--ink3);font-size:12px;font-family:Syne,sans-serif;">Aucun membre</div>';return;}
  el.innerHTML=state.team.map((m,i)=>{
    const pending=(m.tasks||[]).filter(t=>!t.done).length;
    const col=avatarColor(i);
    return`<div class="team-item ${activeMemberId===m.id?'active':''}" onclick="openMember(${m.id})">
      <div class="team-avatar" style="background:${col}22;color:${col};">${initials(m.name)}</div>
      <div style="flex:1;min-width:0;">
        <div class="team-name">${esc(m.name)}</div>
        <div class="team-role">${esc(m.role||'—')} · ${pending} tâche${pending!==1?'s':''}</div>
      </div>
    </div>`;
  }).join('');
}
function renderTeamDetail(mode=''){
  const el=document.getElementById('teamDetail');if(!el)return;
  if(!activeMemberId){el.innerHTML='<div class="team-detail-empty">← Sélectionne une personne</div>';return;}
  const m=state.team.find(m=>m.id===activeMemberId);
  if(!m){el.innerHTML='<div class="team-detail-empty">Introuvable</div>';return;}
  const mi=state.team.indexOf(m);const col=avatarColor(mi);
  const tasks=m.tasks||[];const points=m.points||[];
  // Tasks grouped by project
  const byProj={};const noProj=[];
  tasks.filter(t=>!t.done).forEach(t=>{
    if(t.project){if(!byProj[t.project])byProj[t.project]=[];byProj[t.project].push(t);}
    else noProj.push(t);
  });
  const done=tasks.filter(t=>t.done);
  const taskCard=(t)=>`<div class="ptask">
    <div class="ptask-check ${t.done?'done':''}" onclick="toggleMemberTask(${m.id},${t.id})">${t.done?'✓':''}</div>
    <div style="flex:1;min-width:0;"><div class="ptask-text">${esc(t.text)}</div></div>
    <select style="font-size:10px;border:1px solid var(--b);border-radius:5px;background:var(--bg);color:var(--ink2);padding:2px 3px;cursor:pointer;max-width:80px;" onchange="setMemberTaskProject(${m.id},${t.id},this.value)">
      <option value="">—</option>
      ${state.projects.map(p=>`<option value="${esc(p)}" ${t.project===p?'selected':''}>${esc(p)}</option>`).join('')}
    </select>
    <span style="cursor:pointer;color:var(--ink3);font-size:11px;padding:2px 3px;" onclick="deleteMemberTask(${m.id},${t.id})">✕</span>
  </div>`;
  let tasksHtml='';
  if(Object.keys(byProj).length===0&&noProj.length===0){
    tasksHtml='<div style="font-size:12px;color:var(--ink3);padding:6px 0;font-family:Syne,sans-serif;">Aucune tâche</div>';
  } else {
    Object.entries(byProj).forEach(([proj,ptasks])=>{
      const pc=pcol(proj);
      tasksHtml+=`<div style="margin-bottom:7px;">
        <div style="font-size:10px;font-weight:700;font-family:'Syne',sans-serif;color:${pc};text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;display:flex;align-items:center;gap:4px;">
          <span style="width:5px;height:5px;border-radius:50%;background:${pc};display:inline-block;"></span>${esc(proj)}
        </div>
        ${ptasks.map(t=>taskCard(t)).join('')}
      </div>`;
    });
    if(noProj.length>0)tasksHtml+=`<div style="margin-bottom:7px;"><div style="font-size:10px;font-weight:700;font-family:'Syne',sans-serif;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;">Sans projet</div>${noProj.map(t=>taskCard(t)).join('')}</div>`;
  }
  if(done.length>0){
    tasksHtml+=`<details><summary style="font-size:11px;color:var(--ink3);cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;">✅ Terminées (${done.length})</summary>
      <div style="margin-top:4px;opacity:.6;">${done.map(t=>`<div class="ptask"><div class="ptask-check done" onclick="toggleMemberTask(${m.id},${t.id})">✓</div><div class="ptask-text done" style="flex:1;">${esc(t.text)}</div><span style="cursor:pointer;color:var(--ink3);font-size:11px;" onclick="deleteMemberTask(${m.id},${t.id})">✕</span></div>`).join('')}</div></details>`;
  }
  const isForm=mode==='new'||mode==='edit';
  const formTitle=mode==='edit'?`✏️ Modifier le point du ${new Date(points[editingPointIdx]?.date||todayISO()).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}`:`📝 Point du ${new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}`;
  const formHtml=isForm?`<div class="new-point-form">
    <div class="new-point-h">
      <span style="font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--brand);">${formTitle}</span>
      <span id="autosave-ind" style="font-size:10px;color:var(--s-done);margin-left:auto;opacity:0;transition:opacity .3s;">✓ Sauvegardé</span>
    </div>
    <textarea class="np-textarea" id="np-notes" placeholder="Notes du point…" oninput="autosavePoint(${m.id})">${esc(newPointNotes)}</textarea>
    <div class="np-tasks">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);font-family:'Syne',sans-serif;margin-bottom:3px;">Tâches assignées</div>
      <div id="np-tasks-list">${newPointTasks.map((t,i)=>{const txt=typeof t==='object'?t.text:t;const proj=typeof t==='object'?t.project:'';const pc=proj?pcol(proj):'';return`<div class="np-task-item"><span style="color:var(--ink3);font-size:11px;">→</span><span style="flex:1;">${esc(txt)}</span>${proj?`<span style="font-size:10px;color:${pc};background:${pc}18;padding:1px 5px;border-radius:5px;font-family:'Syne',sans-serif;font-weight:700;">${esc(proj)}</span>`:''}<span style="cursor:pointer;color:var(--ink3);font-size:11px;" onclick="removePointTask(${i})">✕</span></div>`;}).join('')}</div>
    </div>
    <div class="np-task-add">
      <input class="inp" id="np-task-input" placeholder="Tâche…" style="flex:1;font-size:12px;padding:6px 9px;" onkeydown="if(event.key==='Enter')addPointTask()"/>
      <select class="inp" id="np-task-proj" style="width:100px;font-size:12px;padding:6px 8px;">
        <option value="">— Projet —</option>
        ${state.projects.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('')}
      </select>
      <button class="btn btn-soft" style="font-size:11px;" onclick="addPointTask()">+</button>
    </div>
    <div class="np-actions">
      <button class="btn btn-soft" onclick="cancelNewPoint()">Annuler</button>
      <button class="btn btn-ink" onclick="savePoint(${m.id})">💾 ${mode==='edit'?'Mettre à jour':'Sauvegarder'}</button>
    </div>
  </div>`:'';
  const historyHtml=points.length===0
    ?'<div style="font-size:12px;color:var(--ink3);font-family:Syne,sans-serif;padding:6px 0;">Aucun point enregistré</div>'
    :points.map((p,pi)=>{
      const dateStr=new Date(p.date).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
      return`<div class="point-session">
        <div class="point-session-h">
          <span class="point-date">📋 ${dateStr}</span>
          <div style="margin-left:auto;display:flex;gap:5px;">
            <span style="cursor:pointer;color:var(--ink2);font-size:11px;" onclick="editPoint(${m.id},${pi})">✏️</span>
            <span style="cursor:pointer;color:var(--ink3);font-size:11px;" onclick="deletePoint(${m.id},${pi})">✕</span>
          </div>
        </div>
        <div class="point-body">
          ${p.notes?`<div class="point-notes">${esc(p.notes)}</div>`:''}
          ${p.tasks&&p.tasks.length>0?`<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);font-family:'Syne',sans-serif;margin-bottom:4px;">Tâches</div>${groupPointTasksHtml(p.tasks)}</div>`:''}
        </div>
      </div>`;
    }).join('');
  el.innerHTML=`
    <div class="team-person-head">
      <div class="team-person-avatar" style="background:${col}22;color:${col};">${initials(m.name)}</div>
      <div style="flex:1;min-width:0;">
        <input class="team-person-name" value="${esc(m.name)}" oninput="updateMemberName(${m.id},this.value)"/>
        <input class="team-person-role" value="${esc(m.role||'')}" placeholder="Rôle…" oninput="updateMemberRole(${m.id},this.value)"/>
      </div>
      <button class="btn btn-ink" onclick="startNewPoint(${m.id})" ${isForm?'disabled style="opacity:.4;"':''}>+ Point</button>
      <button class="btn btn-soft" style="font-size:11px;" onclick="deleteMember(${m.id})">Supprimer</button>
    </div>
    ${formHtml}
    <div class="team-cols">
      <div class="team-card">
        <div class="team-card-h"><span>📋</span><span class="team-card-title">Tâches (${tasks.filter(t=>!t.done).length})</span></div>
        <div class="team-card-body">
          ${tasksHtml}
          <div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;">
            <input class="inp" id="direct-task-inp" placeholder="Nouvelle tâche…" style="flex:1;min-width:100px;font-size:12px;padding:6px 9px;" onkeydown="if(event.key==='Enter')addDirectTask(${m.id})"/>
            <select class="inp" id="direct-task-proj" style="width:95px;font-size:12px;padding:6px 8px;">
              <option value="">— Projet —</option>
              ${state.projects.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('')}
            </select>
            <button class="btn btn-soft" style="font-size:11px;" onclick="addDirectTask(${m.id})">+</button>
          </div>
        </div>
      </div>
      <div class="team-card">
        <div class="team-card-h"><span>🕐</span><span class="team-card-title">Points (${points.length})</span></div>
        <div class="team-card-body" style="max-height:380px;">${historyHtml}</div>
      </div>
    </div>`;
}

// ── EXPORT/IMPORT ──
function exportData(){
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(state,null,2));
  a.download=`taches-${todayISO()}.json`;a.click();
}
function triggerImport(){document.getElementById('importFile').click();}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const imp=JSON.parse(ev.target.result);
      if(!imp.tasks||!imp.projects)throw new Error('Format invalide');
      if(!confirm(`Importer ${imp.tasks.length} tâche(s) ?`))return;
      if(!imp.lastSaved)imp.lastSaved=Date.now();
      if(!imp.team)imp.team=[];if(!imp.nextMemberId)imp.nextMemberId=1;
      if(!imp.events)imp.events=[];if(!imp.nextEvId)imp.nextEvId=1;
      if(!imp.checklist)imp.checklist={};
      delete imp.flags;
      state=imp;save();render();alert('✅ Import réussi !');
    }catch(e){alert('❌ '+e.message);}
    e.target.value='';
  };r.readAsText(file);
}

// ── MAIN RENDER ──
function render(){
  document.getElementById('hdate').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  checkOverdueTasks();
  // Stats
  const today=todayISO();
  document.getElementById('hs-today').textContent=state.tasks.filter(t=>(t.bucket===today||t.due===today)&&t.status!=='done').length;
  document.getElementById('hs-dead').textContent=state.tasks.filter(t=>(t.bucket==='dead'||isUrgent(t))&&t.status!=='done').length;
  document.getElementById('hs-total').textContent=state.tasks.filter(t=>t.status!=='done').length;
  // Refresh active view
  const active=document.querySelector('.view.active');if(!active)return;
  const vid=active.id.replace('view-','');
  if(vid==='events'){renderDeadlines();renderEventsList();renderEventDetail();renderTodayCol();}
  if(vid==='tasks')renderTasksView();
  if(vid==='week')renderWeek();
  if(vid==='calendar')renderCalendar();
  if(vid==='archive')renderArchive();
  if(vid==='team'){renderTeamList();renderTeamDetail();}
  if(vid==='checklist')renderChecklist();
}

// ── INIT ──
syncProjectsToEvents();
render();
switchView('events',document.querySelector('.nav-tab.active'));
loadFromKV();
</script>
